<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#040e1f"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f2ff"/>
      <stop offset="100%" style="stop-color:#0266ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#00dbe7" stroke-width="0.4" opacity="0.08">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Left accent bar -->
  <rect x="60" y="160" width="5" height="310" fill="url(#accent)" rx="3"/>

  <!-- Badge -->
  <rect x="80" y="155" width="340" height="28" rx="14" fill="#1f2a3c" stroke="#00dbe7" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="100" cy="169" r="5" fill="#00dbe7"/>
  <text x="115" y="174" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00dbe7" letter-spacing="2">AUTHORIZED HARDWARE DISTRIBUTOR</text>

  <!-- Main Title -->
  <text x="80" y="250" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" fill="white">BD Robotec</text>

  <!-- Gradient subtitle -->
  <text x="80" y="320" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#accent)">Premium Electronic Components</text>

  <!-- Description -->
  <text x="80" y="375" font-family="Arial, sans-serif" font-size="20" fill="#d8e3fb" opacity="0.75">Bangladesh's trusted supplier of Arduino, ESP32,</text>
  <text x="80" y="403" font-family="Arial, sans-serif" font-size="20" fill="#d8e3fb" opacity="0.75">Servo Motors, LiDAR Sensors &amp; more.</text>

  <!-- Product tags -->
  <rect x="80" y="435" width="120" height="32" rx="6" fill="#1f2a3c" stroke="#00dbe7" stroke-width="1" stroke-opacity="0.3"/>
  <text x="140" y="456" font-family="Arial, sans-serif" font-size="13" fill="#00dbe7" text-anchor="middle" font-weight="bold">Arduino</text>

  <rect x="215" y="435" width="100" height="32" rx="6" fill="#1f2a3c" stroke="#00dbe7" stroke-width="1" stroke-opacity="0.3"/>
  <text x="265" y="456" font-family="Arial, sans-serif" font-size="13" fill="#00dbe7" text-anchor="middle" font-weight="bold">ESP32</text>

  <rect x="330" y="435" width="130" height="32" rx="6" fill="#1f2a3c" stroke="#00dbe7" stroke-width="1" stroke-opacity="0.3"/>
  <text x="395" y="456" font-family="Arial, sans-serif" font-size="13" fill="#00dbe7" text-anchor="middle" font-weight="bold">Servo Motor</text>

  <rect x="475" y="435" width="110" height="32" rx="6" fill="#1f2a3c" stroke="#00dbe7" stroke-width="1" stroke-opacity="0.3"/>
  <text x="530" y="456" font-family="Arial, sans-serif" font-size="13" fill="#00dbe7" text-anchor="middle" font-weight="bold">LiDAR</text>

  <!-- URL -->
  <text x="80" y="530" font-family="Arial, sans-serif" font-size="18" fill="#d8e3fb" opacity="0.5">robotecbd.vercel.app</text>

  <!-- Right side decorative circuit box -->
  <rect x="820" y="140" width="320" height="350" rx="16" fill="#0d1f3c" stroke="#00dbe7" stroke-width="1" stroke-opacity="0.2"/>
  <text x="980" y="220" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="url(#accent)" text-anchor="middle" opacity="0.15">BD</text>
  <text x="980" y="340" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Fast Shipping</text>
  <text x="980" y="372" font-family="Arial, sans-serif" font-size="16" fill="#d8e3fb" text-anchor="middle" opacity="0.7">2-4 Business Days</text>
  <line x1="900" y1="395" x2="1060" y2="395" stroke="#00dbe7" stroke-width="0.5" opacity="0.3"/>
  <text x="980" y="425" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Bulk Discounts</text>
  <text x="980" y="457" font-family="Arial, sans-serif" font-size="16" fill="#d8e3fb" text-anchor="middle" opacity="0.7">Up to 20% off</text>
</svg>
